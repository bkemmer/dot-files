# imports
include theme.conf

# font
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 12

# cursor
cursor_blink_interval 0
cursor_shape block

# mouse
mouse_hide_wait 10.0

# misc
hide_window_decorations yes

enable_audio_bell no

confirm_os_window_close 0

map ctrl+shift+r load_config_file

map ctrl+0 change_font_size all 0

# Enable layouts
enabled_layouts splits,stack,tall,fat,grid

# Tab bar style
tab_bat_style powerline
tab_powerline_style slanted

# Scrollback
scrollback_lines 10000

# Copy/paste
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# open new tab
map ctrl+shift+t launch --type=tab --cwd=current zsh

# macOC - . This will let you use the alt key to type unicode characters again instead of passing the alt key directly to the shell or whatever you're running.
# macos_option_as_alt no
